name: BambuCam
options:
  bundleIdPrefix: com.ncleroy
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  BambuKit:
    path: BambuKit
targets:
  BambuCam:
    type: application
    platform: macOS
    sources:
      - BambuCam
    dependencies:
      - package: BambuKit
    info:
      path: BambuCam/Info.plist
      properties:
        CFBundleDisplayName: BambuCam
        NSSupportsAutomaticTermination: false
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        NSHumanReadableCopyright: Copyright © 2026 Noah Christian Le Roy
        NSLocalNetworkUsageDescription: BambuCam connects directly to the private IPv4 address of the printer you pair.
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.ncleroy.BambuCam
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          ARCHS: "arm64 x86_64"
          ONLY_ACTIVE_ARCH: NO
          CODE_SIGN_STYLE: Automatic
          ENABLE_HARDENED_RUNTIME: YES
